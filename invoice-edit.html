<script>
tailwind.config = {

      borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },

    },

</script>
<style>
body { font-family: 'Tajawal', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
.glass-card { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
.light .glass-card { background: rgba(255,255,255,0.7); border: 1px solid rgba(0,188,212,0.1); }
.mesh-gradient { transition: background 0.5s ease; background-attachment: fixed; }
.dark .mesh-gradient { background: linear-gradient(135deg, #0c1324 0%, #1e1b4b 50%, #312e81 100%); }
.light .mesh-gradient { background: radial-gradient(at 0% 0%, rgba(0,188,212,0.05) 0%, transparent 50%), radial-gradient(at 100% 100%, rgba(139,92,246,0.05) 0%, transparent 50%), #f8fafc; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
body { min-height: max(884px, 100dvh); }
.sidebar-compact { width: 280px !important; }
.total-display { font-size: 2rem; font-weight: 800; }
@media print { @page { size: A5; margin: 0; } body { background: white !important; } .no-print { display: none !important; } .a5-card { transform: scale(1) !important; box-shadow: none !important; width: 100%; } }
</style>
</head>
<body class="mesh-gradient min-h-screen pb-24 lg:pb-20 overflow-x-hidden text-slate-900 dark:text-slate-100">

<header class="bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl border-b border-black/5 dark:border-white/5 shadow-sm flex justify-between items-center px-4 sm:px-6 lg:px-8 h-20 w-full z-50 fixed top-0 left-0 lg:flex-row-reverse">
  <div class="flex items-center gap-4">
    <button class="text-slate-600 dark:text-slate-300 hover:bg-black/5 dark:hover:bg-white/5 transition-colors p-2 rounded-full lg:hidden" id="menu-btn">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold bg-gradient-to-r from-cyan-600 to-purple-600 dark:from-cyan-400 dark:to-purple-400 bg-clip-text text-transparent font-headline tracking-tight" id="appTitle">عيادة الأثير</h1>
  </div>
  <div class="flex items-center gap-2">
    <button class="text-slate-600 dark:text-slate-300 p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors" id="theme-toggle">
      <span class="material-symbols-outlined dark:hidden">dark_mode</span>
      <span class="material-symbols-outlined hidden dark:block">light_mode</span>
    </button>
  </div>
</header>

<main class="px-4 sm:px-6 lg:px-8 pt-24 sm:pt-28 space-y-6 max-w-lg lg:max-w-4xl mx-auto">
  <section class="space-y-1">
    <p class="text-slate-500 dark:text-secondary text-sm sm:text-base font-medium">إدارة الفواتير</p>
    <h2 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-slate-900 dark:text-white">الفواتير</h2>
  </section>

  <!-- Invoices List -->
  <div class="glass-card rounded-2xl p-6">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-bold flex items-center gap-2">
        <span class="material-symbols-outlined text-amber-500">receipt_long</span>
        قائمة الفواتير
      </h3>
      <a href="invoice.html" class="bg-gradient-to-r from-emerald-500 to-green-600 text-white px-6 py-3 rounded-xl font-bold hover:shadow-lg hover:shadow-emerald-500/30 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined">add</span>
        فاتورة جديدة
      </a>
    </div>
    <div class="space-y-3 max-h-96 overflow-y-auto no-scrollbar" id="invoicesList">
      <div class="text-center py-8 text-slate-400">
        <span class="material-symbols-outlined text-6xl mb-4 block">receipt</span>
        <p>لا توجد فواتير محفوظة</p>
      </div>
    </div>
  </div>
</main>

<!-- BottomNavBar (Mobile) -->
<nav class="bg-white/80 dark:bg-slate-900/40 backdrop-blur-lg fixed bottom-0 left-0 w-full z-50 lg:hidden flex justify-around items-center h-20 rounded-t-[2rem] border-t border-slate-200 dark:border-white/5">
  <a href="home.html" class="flex flex-col items-center justify-center text-slate-400 py-2 hover:text-cyan-600 active:scale-90 transition-all">
    <span class="material-symbols-outlined text-2xl">home</span>
    <span class="font-label text-xs font-medium mt-1">الرئيسية</span>
  </a>
  <a href="add-patient.html" class="flex flex-col items-center justify-center text-slate-400 py-2 hover:text-cyan-600 active:scale-90 transition-all">
    <span class="material-symbols-outlined text-2xl">person_add</span>
    <span class="font-label text-xs font-medium mt-1">مريض</span>
  </a>
  <a href="invoice.html" class="flex flex-col items-center justify-center bg-gradient-to-br from-emerald-500/30 to-green-600/30 text-emerald-600 rounded-lg px-4 py-2 active:scale-95 shadow-lg border border-emerald-200 transition-all">
    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
    <span class="font-label text-xs font-bold mt-1">فاتورة</span>
  </a>
  <a href="settings.html" class="flex flex-col items-center justify-center text-slate-400 py-2 hover:text-cyan-600 active:scale-90 transition-all">
    <span class="material-symbols-outlined text-2xl">settings</span>
    <span class="font-label text-xs font-medium mt-1">الإعدادات</span>
  </a>
</nav>

<!-- Sidebar (Full from home.html) -->
<div class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm z-[55] opacity-0 pointer-events-none transition-opacity duration-300 lg:hidden" id="sidebar-overlay"></div>
<div class="fixed inset-y-0 right-0 z-[60] lg:translate-x-0 lg:relative lg:w-64 flex flex-col bg-white dark:bg-slate-900/90 backdrop-blur-2xl h-screen w-80 rounded-l-3xl border-l border-slate-100 dark:border-white/10 shadow-2xl translate-x-full transition-transform duration-300 sidebar-compact lg:shadow-none lg:border-none" id="sidebar">
  <!-- Full sidebar content from home.html (dashboard nav-items, highlighted invoice) -->
  <div class="p-6 space-y-4">
    <div class="text-lg font-black bg-gradient-to-r from-cyan-600 to-purple-600 dark:from-cyan-400 dark:to-purple-400 bg-clip-text text-transparent">Ethereal Menu</div>
    <div class="space-y-1">
      <a href="home.html" class="nav-item flex items-center gap-3 p-2 bg-cyan-50 dark:bg-white/10 text-cyan-600 dark:text-cyan-400 border-r-4 border-cyan-600 dark:border-cyan-400 rounded-lg">
        <span class="material-symbols-outlined nav-icon">dashboard</span><span class="nav-text font-body font-medium">الرئيسية</span>
      </a>
      <a href="add-patient.html" class="nav-item flex items-center gap-3 p-2 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-white/5 transition-all rounded-lg">
        <span class="material-symbols-outlined nav-icon">person_add</span><span class="nav-text font-body font-medium">إضافة مريض</span>
      </a>
      <a href="invoice.html" class="nav-item flex items-center gap-3 p-2 bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border-r-4 border-emerald-600 dark:border-emerald-400 rounded-lg">
        <span class="material-symbols-outlined nav-icon" style="font-variation-settings: 'FILL' 1;">receipt_long</span><span class="nav-text font-body font-bold">الفواتير</span>
      </a>
      <!-- other nav items -->
    </div>
  </div>
</div>

<script>
let editingInvoiceId = null;
let currentInvoice = { items: [], patient_id: null, examFee: 0, discount: 0, total: 0 };

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.classList.toggle('dark', savedTheme === 'dark');
  document.documentElement.classList.toggle('light', savedTheme !== 'dark');
}

function loadInvoices() {
  const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
  const container = document.getElementById('invoicesList');
  if (invoices.length === 0) {
    container.innerHTML = `
      <div class="text-center py-12 text-slate-400">
        <span class="material-symbols-outlined text-6xl mb-4 block">receipt</span>
        <p>لا توجد فواتير محفوظة</p>
      </div>`;
    return;
  }
  container.innerHTML = invoices.map(inv => `
    <div class="glass-card p-4 rounded-xl hover:bg-white/80 dark:hover:bg-white/10 transition-all cursor-pointer" onclick="editInvoice(${inv.id})">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full bg-emerald-100 dark:bg-emerald-500/20 flex items-center justify-center text-emerald-600 dark:text-emerald-400">
            <span class="material-symbols-outlined">receipt_long</span>
          </div>
          <div>
            <div class="font-bold text-slate-900 dark:text-white">فاتورة #${inv.id.toString().slice(-6)}</div>
            <div class="text-xs text-slate-500 dark:text-slate-400">${new Date(inv.date).toLocaleDateString('ar-IQ')}</div>
          </div>
        </div>
        <div class="text-left">
          <div class="font-bold text-lg text-emerald-600 dark:text-emerald-400">${inv.total.toLocaleString()} د.ع</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">${inv.items.length} مادة</div>
        </div>
      </div>
    </div>
  `).join('');
}

function editInvoice(id) {
  const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
  const invoice = invoices.find(i => i.id === id);
  if (invoice) {
    editingInvoiceId = id;
    // Load to form (similar to invoice.html but prefilled)
    // Redirect to invoice.html with ?edit=id or modal
    window.location.href = `invoice.html?edit=${id}`;
  }
}

function deleteInvoice(id) {
  if (confirm('حذف الفاتورة نهائياً؟')) {
    let invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
    invoices = invoices.filter(i => i.id !== id);
    localStorage.setItem('invoices', JSON.stringify(invoices));
    loadInvoices();
    showToast('تم الحذف');
  }
}

function printInvoice(id) {
  const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
  const invoice = invoices.find(i => i.id === id);
  // Generate A5 print (fill #printArea)
  window.print();
}

function sidebarLogout() {
  if (confirm('تسجيل الخروج؟')) location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  loadInvoices();
  // Sidebar toggle
  document.getElementById('menu-btn').onclick = () => {
    document.getElementById('sidebar').classList.toggle('translate-x-full');
    document.getElementById('sidebar-overlay').classList.toggle('opacity-0');
  };
});
</script>
</body>
</html>
