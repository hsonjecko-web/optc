<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>تسجيل الدخول - عيادة الأثير للبصريات</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#00BCD4",
          "secondary": "#64748b",
          "surface": "#f8fafc",
          "on-surface": "#0f172a",
          "background": "#ffffff",
          "surface-container": "#191f31",
        },
        borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        fontFamily: {
          "headline": ["Tajawal", "Manrope"],
          "body": ["Tajawal", "Plus Jakarta Sans"],
          "label": ["Tajawal", "Plus Jakarta Sans"]
        },
        animation: {
          "float": "float 6s ease-in-out infinite",
          "pulse-slow": "pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite",
          "fade-in": "fadeIn 0.6s ease-out forwards"
        },
        keyframes: {
          float: {
            "0%, 100%": { transform: "translateY(0px)" },
            "50%": { transform: "translateY(-20px)" }
          },
          fadeIn: {
            "0%": { opacity: "0", transform: "translateY(20px)" },
            "100%": { opacity: "1", transform: "translateY(0)" }
          }
        }
      },
    },
  }
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  
  body { 
    font-family: 'Tajawal', sans-serif; 
    transition: background-color 0.3s ease, color 0.3s ease;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  .glass-card { 
    backdrop-filter: blur(20px); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    transition: all 0.3s ease; 
  }
  .light .glass-card { 
    background: rgba(255, 255, 255, 0.85); 
    border: 1px solid rgba(0, 188, 212, 0.2); 
  }
  
  .mesh-gradient { 
    transition: background 0.5s ease; 
    background-attachment: fixed;
    position: relative;
    overflow: hidden;
  }
  .mesh-gradient::before {
    content: '';
    position: absolute; inset: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 20% 80%, rgba(0, 188, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
    animation: pulse-slow 8s ease-in-out infinite;
    pointer-events: none;
  }
  .dark .mesh-gradient { background: linear-gradient(135deg, #0c1324 0%, #1e1b4b 30%, #312e81 70%, #1e1b4b 100%); }
  .light .mesh-gradient { background: radial-gradient(at 0% 0%, rgba(0, 188, 212, 0.08) 0%, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 50%), #f8fafc; }
  
  .floating-icon { position: absolute; opacity: 0.08; animation: float 8s ease-in-out infinite; pointer-events: none; z-index: 0; }
  .floating-icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; font-size: 80px; }
  .floating-icon:nth-child(2) { top: 20%; right: 15%; animation-delay: -2s; font-size: 60px; }
  .floating-icon:nth-child(3) { bottom: 15%; left: 20%; animation-delay: -4s; font-size: 70px; }
  .floating-icon:nth-child(4) { bottom: 25%; right: 10%; animation-delay: -6s; font-size: 50px; }
  
  .login-input { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
  .light .login-input { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 188, 212, 0.3); }
  .login-input:focus { border-color: #00BCD4; box-shadow: 0 0 0 4px rgba(0, 188, 212, 0.2); background: rgba(255, 255, 255, 0.15); }
  .light .login-input:focus { background: white; }
  
  .login-btn {
    background: linear-gradient(135deg, #00BCD4, #7c3aed);
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .login-btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
  }
  .login-btn:hover::before { left: 100%; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
  
  .input-error { border-color: #dc2626 !important; animation: shake 0.3s ease; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  
  .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #1e293b; color: white; padding: 12px 24px; border-radius: 9999px;
    font-size: 14px; font-weight: 500; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    z-index: 1000; transition: transform 0.3s ease, opacity 0.3s ease;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #dc2626; }
  .toast.success { background: #10b981; }
  .light .toast { background: white; color: #1e293b; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }

  @media (max-width: 640px) { .floating-icon { display: none; } }
</style>
</head>
<body class="mesh-gradient min-h-screen flex items-center justify-center p-4 text-slate-900 dark:text-slate-100">

<!-- Floating Background Icons -->
<span class="material-symbols-outlined floating-icon text-cyan-400">eyeglasses</span>
<span class="material-symbols-outlined floating-icon text-purple-400">visibility</span>
<span class="material-symbols-outlined floating-icon text-pink-400">lens_blur</span>
<span class="material-symbols-outlined floating-icon text-cyan-300">remove_red_eye</span>

<!-- Main Login Card -->
<div class="glass-card rounded-3xl p-6 md:p-8 w-full max-w-md mx-auto animate-fade-in relative z-10">
  
  <!-- Theme Toggle -->
  <button class="absolute top-4 left-4 p-2 rounded-full hover:bg-white/10 transition-colors" id="themeToggle" aria-label="تبديل المظهر">
    <span class="material-symbols-outlined dark:hidden text-slate-600">dark_mode</span>
    <span class="material-symbols-outlined hidden dark:block text-amber-300">light_mode</span>
  </button>
  
  <!-- Logo Section -->
  <div class="text-center mb-8 pt-4">
    <div class="w-20 h-20 md:w-24 md:h-24 mx-auto rounded-2xl bg-gradient-to-br from-cyan-400 via-purple-500 to-pink-500 flex items-center justify-center shadow-2xl shadow-cyan-500/30 mb-4 relative">
      <div class="absolute inset-0 bg-white/20 rounded-2xl animate-pulse-slow"></div>
      <span class="material-symbols-outlined text-4xl md:text-5xl text-white relative z-10">eyeglasses</span>
    </div>
    <h1 class="text-2xl md:text-3xl font-black bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 bg-clip-text text-transparent font-headline tracking-tight">
      عيادة الأثير للبصريات
    </h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-body">أدخل بياناتك للدخول إلى التطبيق</p>
  </div>
  
  <!-- Login Form -->
  <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
    
    <!-- Name Field -->
    <div class="space-y-2">
      <label for="username" class="text-sm font-medium text-slate-700 dark:text-slate-300 flex items-center gap-2">
        <span class="material-symbols-outlined text-cyan-500 text-lg">person</span>
        الاسم
      </label>
      <div class="relative">
        <input type="text" id="username" name="username" class="login-input w-full rounded-xl px-4 py-4 pr-12 text-right outline-none text-slate-900 dark:text-white placeholder-slate-400 text-base" placeholder="أدخل اسمك الكامل" required/>
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
      </div>
    </div>
    
    <!-- Phone Field -->
    <div class="space-y-2">
      <label for="phone" class="text-sm font-medium text-slate-700 dark:text-slate-300 flex items-center gap-2">
        <span class="material-symbols-outlined text-purple-500 text-lg">phone</span>
        رقم الهاتف
      </label>
      <div class="relative">
        <input type="tel" id="phone" name="phone" class="login-input w-full rounded-xl px-4 py-4 pr-12 text-right outline-none text-slate-900 dark:text-white placeholder-slate-400 text-base" placeholder="07XX XXX XXXX" required/>
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">call</span>
      </div>
      <p class="text-xs text-slate-400 dark:text-slate-500 mr-1">صيغة الرقم العراقي: 07XXXXXXXXX</p>
    </div>
    
    <!-- Remember Me -->
    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 text-cyan-500 focus:ring-cyan-500 bg-transparent">
        <span class="text-slate-600 dark:text-slate-400">تذكرني على هذا الجهاز</span>
      </label>
    </div>
    
    <!-- Login Button -->
    <button type="submit" id="loginBtn" class="login-btn w-full rounded-xl py-4 text-white font-bold text-base flex items-center justify-center gap-2 shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40">
      <span id="btnText">دخول للتطبيق</span>
      <span class="material-symbols-outlined">login</span>
      <span id="btnSpinner" class="spinner hidden"></span>
    </button>
    
  </form>
  
  <!-- Quick Demo -->
  <div class="text-center mt-6">
    <p class="text-xs text-slate-400 dark:text-slate-500 mb-3">للتجربة السريعة:</p>
    <button onclick="quickLogin()" class="glass-card px-6 py-3 rounded-xl text-sm font-medium text-cyan-600 dark:text-cyan-400 hover:bg-cyan-500/10 transition-all flex items-center justify-center gap-2 mx-auto">
      <span class="material-symbols-outlined text-lg">bolt</span>
      دخول كمستخدم تجريبي
    </button>
  </div>
  
  <!-- Footer -->
  <div class="text-center mt-8 pt-6 border-t border-slate-200 dark:border-white/10">
    <p class="text-xs text-slate-400 dark:text-slate-500">© 2026 عيادة الأثير للبصريات</p>
  </div>
  
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Scripts -->
<script>
  // ===== Theme Management =====
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  
  function initTheme() {
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
    else { html.classList.add('light'); html.classList.remove('dark'); }
  }
  initTheme();
  
  themeToggle.addEventListener('click', () => {
    const isDark = html.classList.toggle('dark');
    html.classList.toggle('light', !isDark);
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  // ===== Toast Notifications =====
  function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'error' ? 'error' : type === 'success' ? 'check_circle' : 'info';
    toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
  }

  // ===== Validation =====
  function validatePhone(phone) { return /^07[0-9]{9}$/.test(phone.replace(/\s/g, '')); }
  function showError(input, message) {
    if(message) {
      input.classList.add('input-error');
      showToast(message, 'error');
      setTimeout(() => input.classList.remove('input-error'), 2000);
    }
  }

  // ===== Phone Auto-Formatting =====
  document.getElementById('phone').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length > 0 && !value.startsWith('07')) value = '07' + value;
    if (value.length >= 4) value = value.slice(0, 4) + ' ' + value.slice(4);
    if (value.length >= 9) value = value.slice(0, 9) + ' ' + value.slice(9);
    e.target.value = value.slice(0, 13);
  });

  // ===== Login Handler (OPEN ACCESS) =====
  async function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const phone = document.getElementById('phone').value.replace(/\s/g, '');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    
    // Basic Validation
    if (username.length < 2) {
      showError(document.getElementById('username'), 'الاسم يجب أن يكون حرفين على الأقل'); return;
    }
    if (!validatePhone(phone)) {
      showError(document.getElementById('phone'), 'يرجى إدخال رقم هاتف عراقي صحيح (07XXXXXXXXX)'); return;
    }
    
    // Loading State
    loginBtn.disabled = true;
    btnText.textContent = 'جاري الدخول...';
    btnSpinner.classList.remove('hidden');
    
    try {
      await new Promise(resolve => setTimeout(resolve, 600));
      
      // Save Session (No credential check needed)
      localStorage.setItem('userSession', JSON.stringify({
        username: username,
        phone: phone,
        loginTime: new Date().toISOString(),
        remember: document.getElementById('remember').checked
      }));
      
      showToast('✓ أهلاً وسهلاً! جاري التحويل...', 'success');
      setTimeout(() => window.location.href = 'home.html', 800);
      
    } catch (error) {
      showToast('حدث خطأ أثناء الدخول', 'error');
    } finally {
      loginBtn.disabled = false;
      btnText.textContent = 'دخول للتطبيق';
      btnSpinner.classList.add('hidden');
    }
  }

  // ===== Quick Demo =====
  function quickLogin() {
    document.getElementById('username').value = 'مستخدم تجريبي';
    document.getElementById('phone').value = '0770 123 4567';
    document.getElementById('remember').checked = true;
    showToast('تم تعبئة بيانات التجربة تلقائياً', 'info');
    setTimeout(() => document.getElementById('loginForm').requestSubmit(), 500);
  }

  // ===== Keyboard Support =====
  document.getElementById('username').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('phone').focus(); });
  document.getElementById('phone').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('loginForm').requestSubmit(); });

  // ===== Auto-fill if Remembered =====
  function checkSession() {
    const session = JSON.parse(localStorage.getItem('userSession') || 'null');
    if (session && session.remember) {
      document.getElementById('username').value = session.username || '';
      document.getElementById('phone').value = session.phone ? session.phone.replace(/(\d{4})(\d{3})(\d{4})/, '$1 $2 $3') : '';
      document.getElementById('remember').checked = true;
      showToast('👋 مرحباً بعودتك!', 'info');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    checkSession();
    // Prevent zoom on mobile input
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => document.querySelector('meta[name="viewport"]').content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
      input.addEventListener('blur', () => document.querySelector('meta[name="viewport"]').content = 'width=device-width, initial-scale=1.0, maximum-scale=5.0');
    });
  });
</script>
</body>
</html>
