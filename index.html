<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسجيل الدخول - عيادة الأثير للبصريات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== The Sovereign Ledger - Premium Design System ========== */
:root {
  --bg-page: #f8fafc;
  --bg-surface: #ffffff;
  --bg-surface-hover: #f1f5f9;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border-light: #e2e8f0;
  --border-normal: #cbd5e1;
  
  /* ألوان التدرج المميزة */
  --grad-cyan: linear-gradient(135deg, #06b5d4, #0891b2);
  --grad-purple: linear-gradient(135deg, #8b5cf6, #7c3aed);
  --grad-gold: linear-gradient(135deg, #eab308, #ca8a04);
  --grad-red: linear-gradient(135deg, #ef4444, #dc2626);
  --grad-green: linear-gradient(135deg, #10b981, #059669);
  --grad-brand: linear-gradient(135deg, #6366f1, #8b5cf6, #3b82f6);
  
  --shadow-card: 0 10px 25px rgba(0,0,0,0.12);
  --shadow-hover: 0 18px 40px rgba(0,0,0,0.18);
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.06);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-page: #0b1120;
  --bg-surface: #111827;
  --bg-surface-hover: #1f2937;
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-light: #1e293b;
  --border-normal: #334155;
  --shadow-card: 0 10px 25px rgba(0,0,0,0.4);
  --shadow-hover: 0 18px 40px rgba(0,0,0,0.55);
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.3);
}

/* ========== Base ========== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Cairo',sans-serif;
  background:var(--bg-page);
  color:var(--text-primary);
  line-height:1.5;
  min-height:100vh;
  transition:var(--transition);
  position:relative;
  overflow-x:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* خلفية متدرجة ناعمة */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at 20% 80%, rgba(6,181,212,0.08) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 50%);
  pointer-events:none;
  z-index:-1;
}

/* جزيئات خلفية */
.particle {
  position:fixed;
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(6,182,212,0.4);
  animation:float 6s ease-in-out infinite;
  pointer-events:none;
  z-index:-1;
}
.particle:nth-child(1){top:20%;left:10%;animation-delay:0s;}
.particle:nth-child(2){top:60%;left:85%;animation-delay:1s;background:rgba(99,102,241,0.4);}
.particle:nth-child(3){top:80%;left:25%;animation-delay:2s;}
.particle:nth-child(4){top:15%;left:70%;animation-delay:3s;background:rgba(16,185,129,0.4);}
@keyframes float { 0%,100%{transform:translateY(0) scale(1);opacity:0.4;} 50%{transform:translateY(-20px) scale(1.3);opacity:0.7;} }

/* ========== بطاقة تسجيل الدخول ========== */
.login-card {
  background:var(--bg-surface);
  border:1px solid var(--border-light);
  border-radius:var(--radius-xl);
  padding:32px 28px;
  width:100%;
  max-width:480px;
  box-shadow:var(--shadow-card);
  transition:var(--transition);
  position:relative;
  overflow:hidden;
}
.login-card::before {
  content:'';
  position:absolute;
  top:0;
  right:0;
  left:0;
  height:4px;
  background:var(--grad-brand);
}
.login-card:hover {
  transform:translateY(-4px);
  box-shadow:var(--shadow-hover);
}

/* ========== الشعار والعنوان ========== */
.login-header {
  text-align:center;
  margin-bottom:28px;
  padding-top:8px;
}
.login-logo {
  width:72px;
  height:72px;
  border-radius:var(--radius-lg);
  background:var(--grad-brand);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 16px;
  box-shadow:0 8px 25px rgba(99,102,241,0.35);
  font-size:2rem;
  position:relative;
  overflow:hidden;
}
.login-logo::after {
  content:'';
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.15);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.15;} 50%{opacity:0.25;} }
.login-title {
  font-size:1.5rem;
  font-weight:800;
  background:var(--grad-brand);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
.login-subtitle {
  font-size:0.9rem;
  color:var(--text-secondary);
  font-weight:500;
}

/* ========== زر تبديل السمة ========== */
.theme-toggle {
  position:absolute;
  top:16px;
  left:16px;
  width:40px;
  height:40px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border-normal);
  background:transparent;
  color:var(--text-primary);
  font-size:1.2rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:var(--transition);
}
.theme-toggle:hover {
  background:var(--bg-surface-hover);
  border-color:var(--color-primary);
  color:#2563eb;
}

/* ========== نموذج الدخول ========== */
.login-form {
  display:flex;
  flex-direction:column;
  gap:20px;
}
.form-group {
  display:flex;
  flex-direction:column;
  gap:8px;
}
.form-label {
  font-size:0.9rem;
  font-weight:600;
  color:var(--text-primary);
  display:flex;
  align-items:center;
  gap:6px;
}
.form-label .icon {
  font-size:1.1rem;
  color:#2563eb;
}
.form-input {
  width:100%;
  padding:14px 16px;
  padding-right:44px;
  border:1px solid var(--border-normal);
  border-radius:var(--radius-md);
  background:var(--bg-surface);
  color:var(--text-primary);
  font-size:0.95rem;
  font-family:'Cairo',sans-serif;
  transition:var(--transition);
  outline:none;
}
.form-input:focus {
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,0.15);
  background:var(--bg-surface-hover);
}
.form-input::placeholder {
  color:var(--text-muted);
}
.input-icon {
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  font-size:1.2rem;
  pointer-events:none;
}
.input-wrapper {
  position:relative;
}
.form-hint {
  font-size:0.75rem;
  color:var(--text-muted);
  margin-top:4px;
}

/* ========== تذكرني ========== */
.remember-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 0;
}
.remember-label {
  display:flex;
  align-items:center;
  gap:8px;
  font-size:0.85rem;
  color:var(--text-secondary);
  cursor:pointer;
  user-select:none;
}
.remember-checkbox {
  width:18px;
  height:18px;
  border:1px solid var(--border-normal);
  border-radius:4px;
  accent-color:#2563eb;
  cursor:pointer;
}

/* ========== زر الدخول ========== */
.login-btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:var(--radius-md);
  background:var(--grad-brand);
  color:#fff;
  font-size:1rem;
  font-weight:700;
  font-family:'Cairo',sans-serif;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:var(--transition);
  box-shadow:0 8px 25px rgba(99,102,241,0.35);
  position:relative;
  overflow:hidden;
}
.login-btn::before {
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition:left 0.5s ease;
}
.login-btn:hover::before { left:100%; }
.login-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 12px 35px rgba(99,102,241,0.5);
}
.login-btn:active { transform:scale(0.98); }
.login-btn:disabled {
  opacity:0.7;
  cursor:not-allowed;
  transform:none !important;
}
.btn-spinner {
  width:20px;
  height:20px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  display:none;
}
.btn-spinner.show { display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ========== تجربة سريعة ========== */
.demo-section {
  text-align:center;
  margin-top:20px;
  padding-top:20px;
  border-top:1px solid var(--border-light);
}
.demo-text {
  font-size:0.8rem;
  color:var(--text-muted);
  margin-bottom:12px;
}
.demo-btn {
  padding:10px 20px;
  border:1px solid var(--border-normal);
  border-radius:var(--radius-md);
  background:transparent;
  color:#2563eb;
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:var(--transition);
}
.demo-btn:hover {
  background:var(--bg-surface-hover);
  border-color:#2563eb;
}

/* ========== التذييل ========== */
.login-footer {
  text-align:center;
  margin-top:24px;
  padding-top:20px;
  border-top:1px solid var(--border-light);
}
.login-footer p {
  font-size:0.75rem;
  color:var(--text-muted);
}

/* ========== Toast Notification ========== */
.toast {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-100px);
  background:var(--bg-surface);
  border:1px solid var(--border-normal);
  border-right:4px solid #10b981;
  color:var(--text-primary);
  padding:12px 20px;
  border-radius:var(--radius-md);
  font-size:0.9rem;
  font-weight:500;
  z-index:1000;
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  box-shadow:var(--shadow-card);
  display:flex;
  align-items:center;
  gap:8px;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.error { border-right-color:#ef4444; }
.toast.info { border-right-color:#0ea5e9; }

/* ========== Responsive ========== */
@media(max-width:480px) {
  .login-card { padding:24px 20px; }
  .login-title { font-size:1.3rem; }
  .login-logo { width:64px; height:64px; font-size:1.8rem; }
}

/* ========== Focus Accessibility ========== */
button:focus-visible,
input:focus-visible {
  outline:2px solid #2563eb;
  outline-offset:2px;
  border-radius:4px;
}

/* ========== Input Error State ========== */
.input-error {
  border-color:#ef4444 !important;
  animation:shake 0.3s ease;
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-4px); }
  75% { transform:translateX(4px); }
}
</style>
</head>
<body>

<!-- جزيئات الخلفية -->
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<!-- Toast Notification -->
<div class="toast" id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>

<!-- بطاقة تسجيل الدخول -->
<div class="login-card">
  
  <!-- زر تبديل السمة -->
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="تبديل النمط" aria-label="تبديل النمط">🌙</button>
  
  <!-- الشعار والعنوان -->
  <div class="login-header">
    <div class="login-logo">👁️</div>
    <h1 class="login-title">عيادة الأثير للبصريات</h1>
    <p class="login-subtitle">أدخل بياناتك للدخول إلى لوحة التحكم</p>
  </div>
  
  <!-- نموذج الدخول -->
  <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
    
    <!-- حقل الاسم -->
    <div class="form-group">
      <label for="username" class="form-label">
        <span class="icon">👤</span>
        الاسم الكامل
      </label>
      <div class="input-wrapper">
        <input type="text" id="username" name="username" class="form-input" placeholder="أدخل اسمك الكامل" required autocomplete="name">
        <span class="input-icon">🪪</span>
      </div>
    </div>
    
    <!-- حقل الهاتف -->
    <!-- حقل الهاتف - بدون pattern -->
<div class="form-group">
  <label for="phone" class="form-label">
    <span class="icon">📱</span>
    رقم الهاتف
  </label>
  <div class="input-wrapper">
    <input type="tel" id="phone" name="phone" class="form-input" 
           placeholder="07XX XXX XXXX" required 
           title="أدخل رقم هاتف عراقي: 07 + 9 أرقام"
           inputmode="tel">
    <span class="input-icon">📞</span>
  </div>
  <p class="form-hint">صيغة الرقم العراقي: 07XXXXXXXXX (11 رقم)</p>
</div>
    
    <!-- تذكرني -->
    <div class="remember-row">
      <label class="remember-label">
        <input type="checkbox" id="remember" class="remember-checkbox">
        تذكرني على هذا الجهاز
      </label>
    </div>
    
    <!-- زر الدخول -->
    <button type="submit" id="loginBtn" class="login-btn">
      <span id="btnText">دخول للتطبيق</span>
      <span id="btnSpinner" class="btn-spinner"></span>
    </button>
    
  </form>
  
  <!-- تجربة سريعة -->
  <div class="demo-section">
    <p class="demo-text">للتجربة السريعة:</p>
    <button type="button" class="demo-btn" onclick="quickLogin()">
      ⚡ دخول كمستخدم تجريبي
    </button>
  </div>
  
  <!-- التذييل -->
  <div class="login-footer">
    <p>© 2026 عيادة الأثير للبصريات • جميع الحقوق محفوظة</p>
  </div>
  
</div>

<script>
// ========== Theme Toggle ==========
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  
  html.setAttribute('data-theme', next);
  btn.textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem('theme', next);
}

// ========== Toast Notification ==========
function showToast(msg, type = 'success') {
  try {
    const toast = document.getElementById('toast');
    const icon = document.getElementById('toast-icon');
    const text = document.getElementById('toast-msg');
    
    if (toast && icon && text) {
      text.textContent = msg;
      icon.textContent = type === 'error' ? '✕' : type === 'info' ? 'ℹ️' : '✓';
      toast.className = `toast ${type}`;
      toast.classList.add('show');
      
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  } catch(e) {
    console.log('Toast error:', e);
  }
}

// ========== Validation ==========
function validatePhone(phone) {
  // إزالة جميع المسافات والرموز غير الرقمية
  const clean = phone.replace(/[\s\-\(\)]/g, '');
  // التحقق: يبدأ بـ 07 ويتبعه 9 أرقام = 11 رقم إجمالي
  return /^07\d{9}$/.test(clean);
}

function cleanPhone(phone) {
  return phone.replace(/[\s\-\(\)]/g, '');
}

function showError(input, message) {
  input.classList.add('input-error');
  showToast(message, 'error');
  setTimeout(() => input.classList.remove('input-error'), 2000);
}

// ========== Phone Auto-Formatting ==========
const phoneInput = document.getElementById('phone');
if (phoneInput) {
  phoneInput.addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length > 0 && !value.startsWith('07')) value = '07' + value;
    if (value.length >= 4) value = value.slice(0, 4) + ' ' + value.slice(4);
    if (value.length >= 9) value = value.slice(0, 9) + ' ' + value.slice(9);
    e.target.value = value.slice(0, 13);
  });
}

// ========== Login Handler - مُحدَّث ومُحسَّن ==========
async function handleLogin(event) {
  event.preventDefault();
  
  const usernameInput = document.getElementById('username');
  const phoneInput = document.getElementById('phone');
  const rememberCheck = document.getElementById('remember');
  const loginBtn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  const btnSpinner = document.getElementById('btnSpinner');
  
  const username = usernameInput.value.trim();
  const phone = cleanPhone(phoneInput.value);
  
  console.log('🔐 محاولة الدخول:', { username, phone });
  
  // Validation
  if (username.length < 2) {
    showError(usernameInput, 'الاسم يجب أن يكون حرفين على الأقل');
    usernameInput.focus();
    return;
  }
  
  if (!validatePhone(phone)) {
    showError(phoneInput, 'يرجى إدخال رقم هاتف عراقي صحيح (07 + 9 أرقام)');
    phoneInput.focus();
    return;
  }
  
  // Loading State
  loginBtn.disabled = true;
  btnText.textContent = 'جاري الدخول...';
  if (btnSpinner) btnSpinner.classList.add('show');
  
  try {
    // محاكاة تأخير الشبكة
    await new Promise(resolve => setTimeout(resolve, 600));
    
    // حفظ الجلسة
    const sessionData = {
      username: username,
      phone: phone,
      loginTime: new Date().toISOString(),
      remember: rememberCheck ? rememberCheck.checked : false
    };
    
    localStorage.setItem('userSession', JSON.stringify(sessionData));
    console.log('✅ تم حفظ الجلسة:', sessionData);
    
    showToast('✓ أهلاً وسهلاً! جاري التحويل...', 'success');
    
    // التوجيه مع تحقق إضافي
    setTimeout(() => {
      // محاولة التوجيه إلى home.html
      window.location.href = 'home.html';
      
      // احتياطي: إذا لم يعمل الرابط بعد 2 ثانية
      setTimeout(() => {
        if (window.location.href.includes('login')) {
          console.log('⚠️ home.html غير موجود، جاري التوجيه البديل...');
          // يمكن تغيير هذا إلى أي صفحة أخرى متوفرة
          // window.location.href = 'archive.html';
          showToast('⚠️ يرجى التأكد من وجود ملف home.html', 'info');
        }
      }, 2000);
    }, 800);
    
  } catch (error) {
    console.error('❌ خطأ في الدخول:', error);
    showToast('حدث خطأ أثناء الدخول، يرجى المحاولة مرة أخرى', 'error');
  } finally {
    loginBtn.disabled = false;
    btnText.textContent = 'دخول للتطبيق';
    if (btnSpinner) btnSpinner.classList.remove('show');
  }
}

// ========== Quick Demo ==========
function quickLogin() {
  const usernameInput = document.getElementById('username');
  const phoneInput = document.getElementById('phone');
  const rememberCheck = document.getElementById('remember');
  
  if (usernameInput) usernameInput.value = 'مستخدم تجريبي';
  if (phoneInput) phoneInput.value = '0770 123 4567';
  if (rememberCheck) rememberCheck.checked = true;
  
  showToast('تم تعبئة بيانات التجربة تلقائياً', 'info');
  
  setTimeout(() => {
    const form = document.getElementById('loginForm');
    if (form) form.requestSubmit();
  }, 500);
}

// ========== Keyboard Support ==========
const usernameInput = document.getElementById('username');
const phoneInputEl = document.getElementById('phone');

if (usernameInput) {
  usernameInput.addEventListener('keypress', e => {
    if(e.key === 'Enter' && phoneInputEl) {
      e.preventDefault();
      phoneInputEl.focus();
    }
  });
}

if (phoneInputEl) {
  phoneInputEl.addEventListener('keypress', e => {
    if(e.key === 'Enter') {
      e.preventDefault();
      const form = document.getElementById('loginForm');
      if (form) form.requestSubmit();
    }
  });
}

// ========== Auto-fill if Remembered ==========
function checkSession() {
  try {
    const sessionStr = localStorage.getItem('userSession');
    if (!sessionStr || sessionStr === 'null') return;
    
    const session = JSON.parse(sessionStr);
    const rememberCheck = document.getElementById('remember');
    
    if (session && session.remember && rememberCheck) {
      const usernameInput = document.getElementById('username');
      const phoneInput = document.getElementById('phone');
      
      if (usernameInput && session.username) {
        usernameInput.value = session.username;
      }
      if (phoneInput && session.phone) {
        // إعادة تنسيق الرقم للعرض
        const formatted = session.phone.replace(/(\d{4})(\d{3})(\d{4})/, '$1 $2 $3');
        phoneInput.value = formatted;
      }
      rememberCheck.checked = true;
      
      console.log('👋 تم استعادة بيانات المستخدم');
      showToast('👋 مرحباً بعودتك!', 'info');
    }
  } catch(e) {
    console.log('Session check error:', e);
  }
}

// ========== Initialize ==========
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 صفحة تسجيل الدخول جاهزة');
  
  // Init Theme
  try {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeBtn = document.getElementById('themeBtn');
    if (themeBtn) {
      themeBtn.textContent = savedTheme === 'light' ? '🌙' : '☀️';
    }
  } catch(e) {
    console.log('Theme init error:', e);
  }
  
  // Check saved session
  checkSession();
  
  // Focus first input
  const usernameInput = document.getElementById('username');
  if (usernameInput) usernameInput.focus();
});

// ========== تشخيص إضافي عند التحميل ==========
window.addEventListener('load', () => {
  console.log('📋 حالة التخزين المحلي:');
  console.log('- localStorage متاح:', !!window.localStorage);
  console.log('- عدد العناصر:', localStorage.length);
  console.log('- userSession موجود:', !!localStorage.getItem('userSession'));
});
</script>
