<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- ========================================
       🔧 إعدادات الصفحة - تسجيل الدخول الاحترافي
       ======================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>نظام التميز - تسجيل الدخول</title>
  
  <!-- 🎨 خطوط وأيقونات خارجية -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <style>
    /* ========================================
       🎨 متغيرات التصميم الاحترافي
       ======================================== */
    :root {
      /* 🌙 الوضع الليلي - ألوان احترافية */
      --bg-page: #0b0f19;
      --bg-main: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      --bg-gradient: radial-gradient(ellipse at top, rgba(59,130,246,0.15) 0%, transparent 50%),
                     radial-gradient(ellipse at bottom, rgba(168,85,247,0.1) 0%, transparent 50%);
      
      --glass-bg: rgba(30, 41, 59, 0.6);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --accent-primary: #3b82f6;
      --accent-secondary: #06b6d4;
      --accent-success: #22c55e;
      --accent-warning: #f59e0b;
      --accent-danger: #ef4444;
      --accent-purple: #a855f7;
      
      --input-bg: rgba(15, 23, 42, 0.7);
      --input-border: rgba(255, 255, 255, 0.15);
      --input-focus: rgba(59, 130, 246, 0.4);
      
      --btn-primary: linear-gradient(135deg, var(--accent-primary), #2563eb);
      --btn-secondary: linear-gradient(135deg, var(--accent-success), #16a34a);
      --btn-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
      
      --header-height: 64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }
    
    /* ☀️ الوضع النهاري - احترافي */
    html.light-mode {
      --bg-page: #f8fafc;
      --bg-main: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0f9ff 100%);
      --bg-gradient: radial-gradient(ellipse at top, rgba(59,130,246,0.08) 0%, transparent 50%),
                     radial-gradient(ellipse at bottom, rgba(168,85,247,0.06) 0%, transparent 50%);
      
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(59, 130, 246, 0.25);
      --glass-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.15);
      
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --input-bg: rgba(248, 250, 252, 0.9);
      --input-border: rgba(59, 130, 246, 0.25);
      --input-focus: rgba(59, 130, 246, 0.2);
      
      --btn-primary: linear-gradient(135deg, #2563eb, #3b82f6);
      --btn-secondary: linear-gradient(135deg, #16a34a, #22c55e);
      --btn-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.25);
    }
    
    /* ========================================
       🧹 إعادة تعيين وتنسيقات أساسية
       ======================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
    html, body { height: 100%; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    body { 
      padding-top: calc(var(--header-height) + var(--safe-top)); 
      padding-bottom: calc(var(--safe-bottom) + 20px);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
    }
    
    /* ========================================
       📱 الهيدر - تصميم احترافي بسيط
       ======================================== */
    .app-header { 
      position: fixed; top: 0; left: 0; right: 0; 
      height: var(--header-height); padding: 0 20px; padding-top: var(--safe-top); 
      display: flex; align-items: center; justify-content: center; 
      background: rgba(15,23,42,0.85); backdrop-filter: blur(20px); 
      border-bottom: 1px solid var(--glass-border); z-index: 100; 
    }
    html.light-mode .app-header { 
      background: rgba(248,250,252,0.85) !important; 
      border-bottom-color: rgba(59,130,246,0.2) !important; 
    }
    
    .theme-toggle { 
      position: absolute; right: 20px;
      display: flex; align-items: center; justify-content: center; 
      background: var(--glass-bg); border: 1px solid var(--glass-border); 
      border-radius: var(--radius-sm); padding: 8px; 
      cursor: pointer; transition: var(--transition);
      width: 40px; height: 40px;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
    .theme-toggle:active { transform: scale(0.95); }
    
    .light-mode-icon { display: none; } 
    html.light-mode .light-mode-icon { display: inline-block !important; } 
    html.light-mode .dark-mode-icon { display: none !important; }
    
    /* ========================================
       🎯 المحتوى الرئيسي - مركز ومحترف
       ======================================== */
    main { 
      min-height: calc(100vh - var(--header-height) - var(--safe-bottom) - 40px); 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      padding: 24px; position: relative;
    }
    
    /* ✨ بطاقة الدخول الاحترافية */
    .login-card { 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border); 
      border-radius: var(--radius-lg); 
      padding: 48px 40px; 
      box-shadow: var(--glass-shadow); 
      backdrop-filter: blur(24px); 
      width: 100%; max-width: 440px; 
      text-align: center; 
      position: relative; 
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 🎨 تأثيرات الخلفية للبطاقة */
    .login-card::before {
      content: '';
      position: absolute;
      top: -50%; right: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 60%);
      animation: pulse 8s ease-in-out infinite;
      pointer-events: none;
    }
    
    .login-card::after {
      content: '';
      position: absolute;
      bottom: -30%; left: -30%;
      width: 160%; height: 160%;
      background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 60%);
      animation: pulse 10s ease-in-out infinite reverse;
      pointer-events: none;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
      50% { transform: scale(1.1) rotate(180deg); opacity: 0.8; }
    }
    
    /* 🏷️ الشعار والعنوان */
    .login-brand { 
      position: relative; z-index: 2; margin-bottom: 8px;
    }
    .login-logo { 
      font-size: 2rem; font-weight: 800; 
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-purple)); 
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .login-subtitle { 
      font-size: 1rem; color: var(--text-secondary); 
      margin-bottom: 40px; position: relative; z-index: 2;
      font-weight: 500;
    }
    
    /* ========================================
       📝 حقول النموذج - تصميم احترافي
       ======================================== */
    .form-group { 
      position: relative; margin-bottom: 24px; 
      text-align: right; position: relative; z-index: 2;
    }
    
    .form-group label {
      display: block; font-size: 0.85rem; font-weight: 600; 
      color: var(--text-secondary); margin-bottom: 8px; text-align: right;
    }
    
    .input-wrapper { position: relative; }
    
    .form-group input { 
      width: 100%; padding: 16px 20px 16px 52px; 
      background: var(--input-bg); 
      border: 1px solid var(--input-border); 
      border-radius: var(--radius-md); 
      color: var(--text-primary); 
      font-size: 1rem; 
      outline: none; 
      transition: var(--transition);
      direction: ltr;
      text-align: left;
    }
    
    .form-group input::placeholder { 
      color: var(--text-muted); 
      opacity: 1;
    }
    
    .form-group input:focus { 
      border-color: var(--accent-primary); 
      box-shadow: 0 0 0 4px var(--input-focus); 
      background: rgba(15,23,42,0.9);
    }
    
    html.light-mode .form-group input:focus {
      background: rgba(248,250,252,0.95);
    }
    
    .form-group .input-icon { 
      position: absolute; left: 18px; top: 50%; 
      transform: translateY(-50%); 
      color: var(--text-muted); 
      font-size: 20px; 
      z-index: 3;
      transition: var(--transition);
    }
    
    .form-group input:focus + .input-icon,
    .form-group input:not(:placeholder-shown) + .input-icon {
      color: var(--accent-primary);
    }
    
    /* 🔐 أزرار الدخول - تصميم ثلاثي الأبعاد */
    .login-btn { 
      width: 100%; padding: 16px 24px; 
      background: var(--btn-primary); 
      border: none; border-radius: var(--radius-md); 
      color: white; font-size: 1.05rem; font-weight: 700; 
      cursor: pointer; transition: var(--transition); 
      box-shadow: var(--btn-shadow); 
      position: relative; z-index: 2; 
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    
    .login-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 15px 35px -5px rgba(59,130,246,0.5);
    }
    
    .login-btn:active { 
      transform: scale(0.98) translateY(0); 
    }
    
    .login-btn:disabled {
      opacity: 0.7; cursor: not-allowed; transform: none;
    }
    
    .login-btn .material-icons-round {
      font-size: 20px;
    }
    
    /* 👤 زر الدخول كزائر */
    .guest-btn { 
      width: 100%; padding: 14px 24px; 
      background: var(--btn-secondary); 
      border: none; border-radius: var(--radius-md); 
      color: white; font-size: 0.95rem; font-weight: 600; 
      cursor: pointer; transition: var(--transition); 
      box-shadow: 0 8px 20px -5px rgba(34,197,94,0.3);
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    
    .guest-btn:hover { 
      transform: translateY(-1px); 
      box-shadow: 0 12px 25px -5px rgba(34,197,94,0.4);
    }
    
    .guest-btn:active { 
      transform: scale(0.98) translateY(0); 
    }
    
    /* ➖ الفاصل */
    .divider { 
      position: relative; text-align: center; 
      margin: 28px 0; color: var(--text-muted); 
      font-size: 0.9rem; position: relative; z-index: 2;
    }
    
    .divider::before { 
      content: ''; position: absolute; 
      top: 50%; right: 0; left: 0; 
      height: 1px; background: var(--glass-border); 
    }
    
    .divider span { 
      background: var(--glass-bg); 
      padding: 0 20px; position: relative;
    }
    
    /* ❌ رسالة الخطأ */
    .error-message {
      color: var(--accent-danger);
      font-size: 0.8rem;
      margin-top: 6px;
      text-align: right;
      display: none;
      animation: shake 0.3s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    
    .form-group.error input {
      border-color: var(--accent-danger) !important;
      box-shadow: 0 0 0 4px rgba(239,68,68,0.15) !important;
    }
    
    .form-group.error .error-message {
      display: block;
    }
    
    /* ⏳ حالة التحميل */
    .btn-loading {
      position: relative;
      pointer-events: none;
      opacity: 0.8;
    }
    
    .btn-loading::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ========================================
       🌙 تحسينات الوضع النهاري
       ======================================== */
    html.light-mode .login-card {
      background: rgba(255,255,255,0.92) !important;
      border-color: rgba(59,130,246,0.3) !important;
      box-shadow: 0 25px 50px -12px rgba(59,130,246,0.2) !important;
    }
    
    html.light-mode .login-card::before {
      background: radial-gradient(circle, rgba(59,130,246,0.04) 0%, transparent 60%);
    }
    
    html.light-mode .login-card::after {
      background: radial-gradient(circle, rgba(168,85,247,0.03) 0%, transparent 60%);
    }
    
    html.light-mode .form-group input {
      background: rgba(248,250,252,0.9) !important;
      border-color: rgba(59,130,246,0.25) !important;
      color: #1e293b !important;
    }
    
    html.light-mode .form-group input::placeholder {
      color: rgba(100,116,139,0.6) !important;
    }
    
    /* ========================================
       📱 استجابة للشاشات الصغيرة
       ======================================== */
    @media (max-width: 480px) {
      .login-card { 
        padding: 40px 28px; 
        margin: 0 12px;
        border-radius: var(--radius-lg);
      }
      
      .login-logo { font-size: 1.8rem; }
      .login-subtitle { font-size: 0.95rem; margin-bottom: 32px; }
      
      .form-group input { padding: 14px 18px 14px 48px; font-size: 0.95rem; }
      .form-group .input-icon { left: 16px; font-size: 18px; }
      
      .login-btn, .guest-btn { padding: 14px 20px; font-size: 1rem; }
    }
    
    /* ========================================
       🔄 شريط التمرير المخصص
       ======================================== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    html.light-mode ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); }
    
    /* ========================================
       🎨 تأثيرات إضافية احترافية
       ======================================== */
    .floating-icon {
      position: absolute;
      font-size: 120px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }
    .floating-icon.top-left { top: 10%; left: 10%; animation: float 6s ease-in-out infinite; }
    .floating-icon.bottom-right { bottom: 10%; right: 10%; animation: float 8s ease-in-out infinite reverse; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }
  </style>
</head>
<body>
  
  <!-- 📱 الهيدر العلوي -->
  <header class="app-header">
    <button class="theme-toggle" onclick="toggleDarkMode()" aria-label="تبديل الوضع">
      <span class="material-icons-round dark-mode-icon">light_mode</span>
      <span class="material-icons-round light-mode-icon">dark_mode</span>
    </button>
  </header>
  
  <!-- 🎯 المحتوى الرئيسي -->
  <main>
    
    <!-- ✨ أيقونات خلفية زخرفية -->
    <span class="material-icons-round floating-icon top-left">shield</span>
    <span class="material-icons-round floating-icon bottom-right">account_balance</span>
    
    <!-- 💎 بطاقة الدخول الاحترافية -->
    <div class="login-card">
      
      <!-- 🏷️ الشعار والعنوان -->
      <div class="login-brand">
        <h1 class="login-logo">نظام التميز</h1>
      </div>
      <p class="login-subtitle">مرحباً بك، يرجى تسجيل الدخول للمتابعة</p>
      
      <!-- 📝 نموذج الدخول -->
      <form id="loginForm" onsubmit="handleLogin(event); return false;">
        
        <!-- 🔢 حقل رقم الهاتف -->
        <div class="form-group" id="phoneGroup">
          <label for="phone">رقم الهاتف</label>
          <div class="input-wrapper">
            <input type="tel" id="phone" placeholder="+968 99 123 456" required pattern="^(\+968|968)?[5-9]\d{7}$" dir="ltr">
            <span class="material-icons-round input-icon">smartphone</span>
          </div>
          <span class="error-message">يرجى إدخال رقم هاتف عماني صحيح</span>
        </div>
        
        <!-- 👤 حقل اسم المستخدم -->
        <div class="form-group" id="usernameGroup">
          <label for="username">اسم المستخدم</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="أدخل اسم المستخدم" required minlength="3">
            <span class="material-icons-round input-icon">person</span>
          </div>
          <span class="error-message">اسم المستخدم يجب أن يكون 3 أحرف على الأقل</span>
        </div>
        
        <!-- 🔐 زر الدخول الرئيسي -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="material-icons-round">login</span>
          <span>تسجيل الدخول</span>
        </button>
        
      </form>
      
      <!-- ➖ فاصل -->
      <div class="divider">
        <span>أو</span>
      </div>
      
      <!-- 👤 زر الدخول كزائر -->
      <button class="guest-btn" onclick="handleGuestLogin()">
        <span class="material-icons-round">eye</span>
        <span>دخول كزائر</span>
      </button>
      
    </div>
    
  </main>
  
  <!-- ⚙️ كود الجافاسكريبت -->
  <script>
    // ========================================
    // 🔄 تهيئة الصفحة
    // ========================================
    document.addEventListener('DOMContentLoaded', function() {
      // تحميل تفضيل الوضع من الذاكرة
      if(localStorage.getItem('darkMode') === 'false') {
        document.documentElement.classList.add('light-mode');
      }
      updateDarkModeIcon();
      
      // تركيز تلقائي على حقل الهاتف
      document.getElementById('phone').focus();
    });
    
    // ========================================
    // 🌙 تبديل الوضع الليلي/النهاري
    // ========================================
    function toggleDarkMode() {
      document.documentElement.classList.toggle('light-mode');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('light-mode') ? 'false' : 'true');
      updateDarkModeIcon();
    }
    
    function updateDarkModeIcon() {
      const darkIcon = document.querySelector('.dark-mode-icon');
      const lightIcon = document.querySelector('.light-mode-icon');
      if (document.documentElement.classList.contains('light-mode')) {
        darkIcon.style.display = 'inline-block';
        lightIcon.style.display = 'none';
      } else {
        darkIcon.style.display = 'none';
        lightIcon.style.display = 'inline-block';
      }
    }
    
    // ========================================
    // ✅ التحقق من صحة البيانات
    // ========================================
    function validatePhone(phone) {
      // نمط رقم الهاتف العماني: يبدأ بـ +968 أو 968، ثم رقم من 5-9، ثم 7 أرقام
      const omanPhone = /^(\+968|968)?[5-9]\d{7}$/;
      return omanPhone.test(phone.replace(/\s|-/g, ''));
    }
    
    function validateUsername(username) {
      return username.trim().length >= 3;
    }
    
    function showError(groupId, show) {
      const group = document.getElementById(groupId);
      if(show) {
        group.classList.add('error');
      } else {
        group.classList.remove('error');
      }
    }
    
    // ========================================
    // 🔐 معالجة تسجيل الدخول
    // ========================================
    function handleLogin(event) {
      event.preventDefault();
      
      const phone = document.getElementById('phone').value.trim();
      const username = document.getElementById('username').value.trim();
      const btn = document.getElementById('loginBtn');
      
      let hasError = false;
      
      // التحقق من رقم الهاتف
      if(!validatePhone(phone)) {
        showError('phoneGroup', true);
        hasError = true;
      } else {
        showError('phoneGroup', false);
      }
      
      // التحقق من اسم المستخدم
      if(!validateUsername(username)) {
        showError('usernameGroup', true);
        hasError = true;
      } else {
        showError('usernameGroup', false);
      }
      
      if(hasError) return;
      
      // حالة التحميل
      btn.disabled = true;
      btn.classList.add('btn-loading');
      btn.querySelector('span:last-child').textContent = 'جاري التحقق...';
      
      // محاكاة تأخير الخادم
      setTimeout(() => {
        // حفظ بيانات الجلسة
        localStorage.setItem('userName', username);
        localStorage.setItem('userPhone', phone);
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loginTime', new Date().toISOString());
        
        // التوجيه للوحة التحكم
        window.location.href = 'home.html';
      }, 1500);
    }
    
    // ========================================
    // 👤 معالجة الدخول كزائر
    // ========================================
    function handleGuestLogin() {
      const btn = document.querySelector('.guest-btn');
      
      // تأثير تحميل بسيط
      btn.disabled = true;
      btn.innerHTML = '<span class="material-icons-round" style="animation:spin 0.8s linear infinite">refresh</span> جاري التحميل...';
      
      setTimeout(() => {
        localStorage.setItem('userName', 'زائر');
        localStorage.setItem('userPhone', '+968xxxxxxxxx');
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('isGuest', 'true');
        window.location.href = 'home.html';
      }, 800);
    }
    
    // إزالة حالة الخطأ عند الكتابة
    document.getElementById('phone').addEventListener('input', () => showError('phoneGroup', false));
