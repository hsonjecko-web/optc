<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>نظام التميز - تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --bg-page: #0b0f19; --bg-main: linear-gradient(135deg, #111827 0%, #0f172a 100%);
      --glass-bg: rgba(30, 41, 59, 0.4); --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --text-primary: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
      --accent-blue: #3b82f6; --accent-green: #22c55e; --accent-cyan: #06b6d4;
      --accent-purple: #a855f7; --accent-red: #ef4444; --accent-amber: #f59e0b;
      --header-height: 64px; --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
    html, body { height: 100%; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    body { padding-top: calc(var(--header-height) + var(--safe-top)); padding-bottom: calc(var(--safe-bottom) + 20px); }
    
    /* Header - Simplified for login */
    .app-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); padding: 0 16px; padding-top: var(--safe-top); display: flex; align-items: center; justify-content: center; background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); z-index: 100; }
    .theme-btn { display: flex; align-items: center; justify-content: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 6px 10px; cursor: pointer; position: absolute; left: 16px; }
    .theme-btn:active { background: rgba(255,255,255,0.1); }
    
    /* Main Content - Centered login form */
    main { height: calc(100vh - var(--header-height) - var(--safe-bottom) - 40px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; max-width: 500px; margin: 0 auto; }
    .login-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px 32px; box-shadow: var(--glass-shadow); backdrop-filter: blur(16px); width: 100%; text-align: center; position: relative; overflow: hidden; }
    .login-card::before { content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 200%; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
    .login-logo { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; position: relative; z-index: 1; }
    .login-title { font-size: 1.1rem; margin-bottom: 32px; color: var(--text-secondary); position: relative; z-index: 1; }
    
    /* Form Fields - Glass inputs */
    .form-group { position: relative; margin-bottom: 24px; }
    .form-group input { width: 100%; padding: 16px 20px; background: rgba(15,23,42,0.6); border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-primary); font-size: 1rem; outline: none; transition: all 0.3s; position: relative; z-index: 1; }
    .form-group input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); background: rgba(15,23,42,0.8); }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-group .material-icons-round { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 20px; z-index: 2; }
    .form-group input { padding-left: 50px; }
    
    /* Buttons - 3D Premium Style */
    .login-btn { width: 100%; padding: 16px; background: linear-gradient(145deg, var(--accent-blue), #2563eb); border: none; border-radius: 14px; color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(59,130,246,0.4); position: relative; z-index: 1; margin-bottom: 20px; }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.5); }
    .login-btn:active { transform: scale(0.98); }
    .guest-btn { width: 100%; padding: 14px; background: linear-gradient(145deg, var(--accent-green), #16a34a); border: none; border-radius: 14px; color: white; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(34,197,94,0.3); position: relative; z-index: 1; }
    .guest-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
    .guest-btn:active { transform: scale(0.98); }
    
    /* Divider */
    .divider { position: relative; text-align: center; margin: 24px 0; color: var(--text-muted); position: relative; z-index: 1; }
    .divider::before { content: ''; position: absolute; top: 50%; right: 0; left: 0; height: 1px; background: var(--glass-border); z-index: -1; }
    .divider span { background: var(--glass-bg); padding: 0 16px; }
    
    /* Light Mode */
    html.light-mode { --bg-main: radial-gradient(circle at 50% -20%, #f0f9ff 0%, #e0f2fe 100%) !important; --glass-bg: rgba(255,255,255,0.75) !important; --glass-border: rgba(59,130,246,0.2) !important; --text-primary: #1e293b !important; --text-secondary: #64748b !important; --text-muted: rgba(30,41,59,0.5) !important; }
    html.light-mode .app-header { background: rgba(240,245,250,0.8) !important; border-bottom-color: rgba(59,130,246,0.15) !important; }
    html.light-mode .login-card { background: rgba(255,255,255,0.9) !important; border-color: rgba(59,130,246,0.25) !important; box-shadow: 0 20px 40px rgba(59,130,246,0.15) !important; }
    html.light-mode .form-group input { background: rgba(59,130,246,0.05) !important; border-color: rgba(59,130,246,0.2) !important; color: #1e293b !important; }
    html.light-mode .form-group input::placeholder { color: rgba(30,41,59,0.4) !important; }
    
    @media (max-width: 480px) { .login-card { padding: 32px 24px; margin: 0 12px; } }
    .error { border-color: var(--accent-red) !important; box-shadow: 0 0 0 3px rgba(239,68,68,0.2) !important; }
    .loading { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <header class="app-header">
    <button class="theme-btn" onclick="toggleDarkMode()">
      <span class="material-icons-round dark-mode-icon">light_mode</span>
      <span class="material-icons-round light-mode-icon">dark_mode</span>
    </button>
  </header>
  
  <main>
    <div class="login-card">
      <h1 class="login-logo">نظام التميز</h1>
      <p class="login-title">الدخول إلى لوحة التحكم</p>
      
      <form id="loginForm" onsubmit="handleLogin(event); return false;">
        <div class="form-group">
          <span class="material-icons-round">smartphone</span>
          <input type="tel" id="phone" placeholder="رقم الهاتف (+968xxxxxxxxx)" required dir="ltr">
        </div>
        <div class="form-group">
          <span class="material-icons-round">person</span>
          <input type="text" id="username" placeholder="اسم المستخدم" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          دخول
        </button>
      </form>
      
      <div class="divider">
        <span>أو</span>
      </div>
      
      <button class="guest-btn" onclick="handleGuestLogin()">
        دخول كزائر
      </button>
    </div>
  </main>
  
  <script>
    // Dark mode persistence
    document.addEventListener('DOMContentLoaded', function() {
      if(localStorage.getItem('darkMode') === 'false') document.documentElement.classList.add('light-mode');
      updateDarkModeIcon();
    });
    
    function toggleDarkMode() {
      document.documentElement.classList.toggle('light-mode');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('light-mode') ? 'false' : 'true');
      updateDarkModeIcon();
    }
    
    function updateDarkModeIcon() {
      const darkIcon = document.querySelector('.dark-mode-icon');
      const lightIcon = document.querySelector('.light-mode-icon');
      if (document.documentElement.classList.contains('light-mode')) {
        darkIcon.style.display = 'inline-block';
        lightIcon.style.display = 'none';
      } else {
        darkIcon.style.display = 'none';
        lightIcon.style.display = 'inline-block';
      }
    }
    
    function validatePhone(phone) {
      const omanPhone = /^(\+968|968)?[5-9]\d{7}$/;
      return omanPhone.test(phone.replace(/\s/g, ''));
    }
    
    function handleLogin(event) {
      event.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      const username = document.getElementById('username').value.trim();
      const btn = document.getElementById('loginBtn');
      const phoneInput = document.getElementById('phone');
      
      if (!validatePhone(phone)) {
        phoneInput.classList.add('error');
        alert('يرجى إدخال رقم هاتف عماني صحيح (مثال: +96899123456)');
        return;
      }
      
      phoneInput.classList.remove('error');
      btn.textContent = 'جاري التحميل...';
      btn.classList.add('loading');
      
      // Simulate API delay
      setTimeout(() => {
        localStorage.setItem('userName', username);
        localStorage.setItem('userPhone', phone);
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'home.html';
      }, 1200);
    }
    
    function handleGuestLogin() {
      localStorage.setItem('userName', 'زائر');
      localStorage.setItem('userPhone', '+968xxxxxxxxx');
      localStorage.setItem('isLoggedIn', 'true');
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
